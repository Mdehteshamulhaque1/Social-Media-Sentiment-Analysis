version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sip}
      POSTGRES_USER: ${POSTGRES_USER:-sip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sip}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sip} -d ${POSTGRES_DB:-sip}']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sip_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: sip_redis
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sip_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Analytics Service
  fastapi:
    build:
      context: .
      dockerfile: backend/fastapi_service/Dockerfile.prod
    container_name: sip_fastapi
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPATH: /app
      APP_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-sip}:${POSTGRES_PASSWORD:-sip}@postgres:5432/${POSTGRES_DB:-sip}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'
    networks:
      - sip_network
    volumes:
      - ./logs/fastapi:/app/logs
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: backend/fastapi_service/Dockerfile.prod
    container_name: sip_celery
    restart: unless-stopped
    command: >
      celery -A backend.fastapi_service.app.tasks.celery_app.celery_app 
      worker 
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=4
      --max-tasks-per-child=1000
      --time-limit=3600
      --soft-time-limit=3500
    env_file: .env
    environment:
      PYTHONPATH: /app
      APP_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      POSTGRES_DSN: postgresql+psycopg://${POSTGRES_USER:-sip}:${POSTGRES_PASSWORD:-sip}@postgres:5432/${POSTGRES_DB:-sip}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sip_network
    volumes:
      - ./logs/celery:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Django Admin & Auth Service
  django:
    build:
      context: .
      dockerfile: backend/django_admin/Dockerfile.prod
    container_name: sip_django
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONPATH: /app
      APP_ENV: production
      FASTAPI_BASE_URL: ${FASTAPI_BASE_URL:-http://fastapi:8000/api/v1}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/1
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    ports:
      - '8001:8001'
    networks:
      - sip_network
    volumes:
      - ./logs/django:/app/logs
      - django_static:/app/staticfiles
      - django_media:/app/media
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/api/auth/health/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: sip_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    networks:
      - sip_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: sip_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - fastapi
      - django
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - sip_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  django_static:
    driver: local
  django_media:
    driver: local
  nginx_cache:
    driver: local

networks:
  sip_network:
    driver: bridge
